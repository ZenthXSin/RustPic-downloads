<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustPic 下载</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #111; color: #e8efee; }
    body { max-width: 1120px; margin: 0 auto; padding: 48px 20px; }
    a { color: #62bbb7; }
    h1 { margin: 0 0 8px; }
    h2 { margin: 0 0 14px; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr); gap: 40px; align-items: start; }
    section, aside { border-top: 1px solid #343b3a; padding: 20px 0; }
    .stack { display: grid; gap: 24px; }
    .muted { color: #a2aeac; }
    .item-list { display: grid; gap: 14px; }
    .item { border-top: 1px solid #343b3a; padding-top: 14px; }
    .item:first-child { border-top: 0; padding-top: 0; }
    .item strong { display: block; overflow-wrap: anywhere; }
    .item small { display: block; margin-top: 6px; color: #a2aeac; line-height: 1.45; }
    .latest { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    @media (max-width: 820px) {
      body { padding: 36px 18px; }
      main, .latest { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>
  <h1>RustPic</h1>
  <p class="muted">面向游戏贴图创作者的对话式图像工作台。</p>
  <main>
    <div class="stack">
      <section>
        <h2>最新版本</h2>
        <div class="latest">
          <div><h3>稳定版</h3><p id="stable">正在读取版本信息...</p></div>
          <div><h3>测试版</h3><p id="beta">正在读取版本信息...</p></div>
        </div>
      </section>
      <section>
        <h2>正式版历史版本</h2>
        <div id="versions" class="item-list muted">正在读取历史版本...</div>
      </section>
    </div>
    <aside>
      <h2>主仓库历史提交</h2>
      <div id="commits" class="item-list muted">正在读取提交记录...</div>
    </aside>
  </main>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
      }[char]));
    }

    function formatDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toLocaleString();
    }

    function renderVersion(info) {
      const name = escapeHtml(info.versionName || info.title || '未知版本');
      const date = formatDate(info.publishedAt);
      const channel = info.channel ? ` · ${escapeHtml(info.channel)}` : '';
      const meta = [date, info.versionCode ? `版本号 ${escapeHtml(info.versionCode)}` : ''].filter(Boolean).join(' · ');
      const apk = info.apkUrl ? `<br><a href="${escapeHtml(info.apkUrl)}">下载 APK</a>` : '';
      return `<strong>${name}${channel}</strong><br><small>${meta}${apk}</small>`;
    }

    async function load(channel) {
      const target = document.getElementById(channel);
      try {
        const response = await fetch(`api/${channel}.json`, { cache: 'no-store' });
        if (!response.ok) throw new Error('metadata missing');
        const info = await response.json();
        target.innerHTML = renderVersion(info);
      } catch (_) { target.textContent = '暂时无法读取版本信息。'; }
    }

    async function loadVersions() {
      const target = document.getElementById('versions');
      try {
        const response = await fetch('api/versions.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('history missing');
        const payload = await response.json();
        const versions = Array.isArray(payload.versions) ? payload.versions : [];
        if (versions.length === 0) {
          target.textContent = '暂无历史版本。';
          return;
        }
        target.classList.remove('muted');
        target.innerHTML = versions.map(version => `<article class="item">${renderVersion(version)}</article>`).join('');
      } catch (_) { target.textContent = '暂无正式版历史版本。'; }
    }

    async function loadCommits() {
      const target = document.getElementById('commits');
      try {
        const response = await fetch('api/commits.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('commits missing');
        const payload = await response.json();
        const commits = Array.isArray(payload.commits) ? payload.commits : [];
        if (commits.length === 0) {
          target.textContent = '暂无提交记录。';
          return;
        }
        target.classList.remove('muted');
        target.innerHTML = commits.map(commit => `
          <article class="item">
            <strong>${escapeHtml(commit.subject)}</strong>
            <small>${escapeHtml(commit.shortSha)} · ${formatDate(commit.committedAt)}</small>
          </article>
        `).join('');
      } catch (_) { target.textContent = '暂时无法读取提交记录。'; }
    }

    load('stable');
    load('beta');
    loadVersions();
    loadCommits();
  </script>
</body>
</html>
