<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustPic 下载</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #111; color: #e8efee; }
    body { max-width: 1120px; margin: 0 auto; padding: 48px 20px; }
    a { color: #62bbb7; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 40px; align-items: start; }
    section { border-top: 1px solid #343b3a; padding: 20px 0; }
    .muted { color: #a2aeac; }
    .commit-list { display: grid; gap: 14px; }
    .commit { border-top: 1px solid #343b3a; padding-top: 14px; }
    .commit strong { display: block; overflow-wrap: anywhere; }
    .commit small { display: block; margin-top: 6px; color: #a2aeac; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; gap: 8px; } }
  </style>
</head>
<body>
  <h1>RustPic</h1>
  <p class="muted">面向游戏贴图创作者的对话式图像工作台。</p>
  <main>
    <div>
      <section><h2>稳定版</h2><p id="stable">正在读取版本信息...</p></section>
      <section><h2>测试版</h2><p id="beta">正在读取版本信息...</p></section>
    </div>
    <aside>
      <h2>主仓库最新提交</h2>
      <div id="commits" class="commit-list muted">正在读取提交记录...</div>
    </aside>
  </main>
  <script>
    async function load(channel) {
      const target = document.getElementById(channel);
      try {
        const info = await fetch(`api/${channel}.json`, { cache: 'no-store' }).then(response => response.json());
        target.innerHTML = `${info.versionName} · ${new Date(info.publishedAt).toLocaleString()}<br><a href="${info.apkUrl}">下载 APK</a>`;
      } catch (_) { target.textContent = '暂时无法读取版本信息。'; }
    }
    load('stable'); load('beta');
    async function loadCommits() {
      const target = document.getElementById('commits');
      try {
        const payload = await fetch('api/commits.json', { cache: 'no-store' }).then(response => response.json());
        const commits = Array.isArray(payload.commits) ? payload.commits : [];
        if (commits.length === 0) {
          target.textContent = '暂无提交记录。';
          return;
        }
        target.classList.remove('muted');
        target.innerHTML = commits.map(commit => `
          <article class="commit">
            <strong>${commit.subject}</strong>
            <small>${commit.shortSha} · ${new Date(commit.committedAt).toLocaleString()}</small>
          </article>
        `).join('');
      } catch (_) { target.textContent = '暂时无法读取提交记录。'; }
    }
    loadCommits();
  </script>
</body>
</html>
